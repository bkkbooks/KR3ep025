body:
  text: 藩署蕭四爺治驗丸方人年四十陰氣自平從古至今未嘗不若是也惟尊軀獨異者正氣不足濕痰素多陽事早痿耳豫偶閲醫書夜臥臂在被外者每易招寒而痛婦人露臂枕兒者亦易受涼而痛此尊軀之病雖非得於被外枕兒而其起痛之因本因於臥在竹榻竹榻之性寒涼者也日日臥之則寒涼之氣未有不襲筋骨較之前二條之偶傷經絡者更進一層所以陽氣不宣屈伸不利痛無虛日喜熱惡寒矣仲景云一臂不舉此為痹載在中門風中也實非真中而卻類中之機豈容忽視現在治法首重補陽兼養陰血寓之以驅寒加之以化痰再取經絡通之則一方制度自不失君臣佐使焉大熟地八兩歸身四兩赤芍二兩附子二兩黨參四兩於朮四兩茯苓八兩黃耆二兩半夏四兩虎掌一對阿膠三兩橘紅二兩薑黃一兩桂枝一兩沉香五錢甘草一兩枳殼二兩海桐皮二兩風化硝一兩西羌活一兩為末取竹瀝一茶碗薑汁二匙和入淡蜜水泛丸衛道觀前頭鳴右盛頭為天谷藏神者也面無精彩頭苦常鳴豈非天谷內虛神色無華乎然頭鳴右盛痰火必多不得不兼顧之大熟地天冬黨參三味煮膏制於術黃耆龍眼肉炙草茯苓遠志肉石決明棗仁木香半夏橘紅阿膠竹茹甘菊為末糊丸三錢鹽湯下德清某營血本虧陰火又旺責在先天後天脾氣不健肝木乘之所進飲食生痰生飲貯之於胃尚可從吐而出相安於無事遲之又久走入膜外氣道不清脹自作焉脾為生痰之源胃為貯痰之器若非運化中宮兼透膜外則痛勢有加無已成為脹滿亦屬易易耳然脾統血肝藏血病久血更衰少治以化痰不得不佐以和養古人之潤燥互用正為此等症而設杜蘇子白芥子當歸茯苓炙草生於術半夏萊蔔子大腹皮白芍車前子海蜇大荸薺陳皮真厚朴嘉興吳大小便易位而出名曰交腸陡然氣亂於中卻為暴病也遲之又久腸間穢物歸併膀胱一飲一食都從小便而出比之交腸症似是而實非者良由瘀血內阻大腸廢而不用幽門闢為坦徑闌門不司泌別舍故趨新舍寬趨隘日痹一日竊恐元氣不支而敗此時論治必須故道復通瘀血漸消庶乎近理旋覆花青蔥新絳歸鬚柏仁薺菜花首烏另用舊紗帽一頂炙灰每服一錢五分煮酒下安徽程先生之病素稟濕熱又挾陰虛之症也濕者何地之氣也熱者何天之氣也天地鬱蒸濕熱生焉天地交泰絪蘊生也生生不息之機妙合於其間稟而受者濕熱元氣混合一家出自先天牢不可破較之外感內傷之濕熱屬在後天者一掃而淨豈可同日而語哉設使薄滋味遠房幃不過生瘡動血幼年所患等症而已惟事膏粱更多嗜欲外增濕熱內耗陰精則臟腑榮衛常有春夏之情而無秋冬之氣無怪乎其亥年之氣風火相煽耳苦於鳴豈非陽氣萬物盛上而躍之一驗乎當斯時也靜以養之則臍冷齒痛以下見症之外猶可相安於無事何乃火之添油喜功生事陡然頭昏面赤一派炎炎之勢甚至火極似水陽不成其為陽熱不成其為熱肝經之火督脈之陽亦從而犯上失其本來之面目夫近聞引火歸源以為甘溫能治火熱之計嗟乎未聞道也甘溫能治大熱者良以下極陰寒真陽上越引其火歸其源則坎離交媾太極自安若太陰濕熱蒸動而上者投以清滋尚難對待斷不敢以火濟火明犯一誤不可再誤之戒然清已有法滋亦不少飲食能增身體能胖外有餘矣而色色不能久立久坐者即病機中萬物陰陽不定未有主也之條際此外盛中空下虛上實用藥實難嘗見東垣之清燥湯丹溪之虎潛丸潤燥合宜剛柔協濟張氏每贊此兩方始克有賴何樂而不即用之耶無如藥力之所以載行者胃氣也胃屬陽明陽明中土萬物所歸濕熱竊踞亦久已薰蒸傳為吐血嗽痰鼻塞噫氣氣便失調正是九竅不和都屬胃病欲安內臟必先清其外腑又為要著至於秋末冬初病甚者十月坤卦純陰天已靜矣而濕熱反為之動腎欲藏矣而濕熱反為之露致邪令正失能不令病者之更進一層乎附方謹覆青鹽四兩甘草八兩荸薺一斤海蜇二斤萆薢一兩飴糖八兩刺蝟皮一兩五錢橘葉五錢霞天曲一兩五錢十大功勞葉一斤共為細末竹瀝水泛丸服完後合虎潛丸全料同合常服杭州汪細繹病源陽分比陰分更虧之候也陰虧而用十全養榮等法責重乎陰寓以陽藥本屬和平之劑良以秋分在即燥氣加臨不敢責重乎陽以燥就燥反增燥病焉耳然於膏方下之後日可附桂斟酌用之一語早已言之非見不到也蓋天地之氣清矣半月一更人身之氣亦半月一更八月而至九月氣已二更病勢不除飲食反減明明陰得膏滋而無病陽得膏滋而更衰一月之間陰陽偏勝一膏之內功過相抵可嘆補偏救弊因時制宜應接無暇也所言念七念八九兩日霜降始寒寒氣外侵痰飲內動動見青黃緑色水尚屬陽明胃腑至於黑這一色已自陽明胃底而來腎虛水泛脾虛積飲已見一班然神氣困倦面色青浮脈見雙弦以始陽氣不充痰飲內聚宜矣而反忽然牙齒浮疼加以口舌酸泔厄忒於胃衛逆於脅變出一番火氣者肝火也肝氣也氣火之橫逆不外腎虛無以涵木木須順乘脾土此等氣不足即是寒之根柢及見氣有餘便是火之形狀所謂本寒標熱症是也夫惟本寒標熱豈陽氣之虛較之陰氣更進一層耶此時論坎離當然不定始可陰霾四散宗風虛則熾痰寒則壅之訓而出一星附散法以助脾陽俾虛風寒痰不相互結非獨分解病情而且土旺用事更合機宜如一立冬又不可以純陽無陰之品施於久病陰血本虧之體冬月宜藏之令者以此方分兩三次一日進一服參入前定滋方中只取五錢清晨服下傍晚再服水泛金匱腎氣丸錢半淡鹽湯送下以占冬至陽生弗藥有喜至於黑錫丹控涎丹本來合式因病處方隨機應變相時而動者須煩兩先生權之嘉興張細繹病源本屬暑濕熱三氣之因也始而濕祕後以熱結所感暑邪能不久變乎然此初中末三者而道其常尚未言其變所變者何昔肥今瘦瘦人多火濕已化火火已就燥而況更有變者痰結肺經而取效葶杏熱結腸間又增大便如栗甚至肺與大腸相為表裡二金同受火刑皮膚燥脫豈非濕生痰痰生熱熱生風之一驗乎若夫水液渾濁皆屬於熱內熱生痿不能起床鼻之燥耳之鳴眼之淚熱象不一而足陰亦不一而傷至於口中不渴似屬令人不解然亦不難曰久病入絡絡亦主血血主濡所以但干而不渴耳宗無陰則陽無以化例請政鮮首烏薑炒山梔石決明方解青鹽杏仁牛膝柏子仁薛家灣郭陰絡傷則血溢血內溢則後血血之從後出者已經數載時發時止惟有盛於去年也今春榮血日虧衛氣益虛虛則氣不攝血亦因咳而來陽絡更傷中焦失守不獨肝腎內虛無怪乎其浮腫於前喘促於後甚至飲食不思噁心欲吐脈而數疾無倫竟有陰從下脫陽從上脫之意焉急急大補俾得抱一不離已恐鞭長莫及人參麥冬五味子坎氣牡蠣龍骨河車川柏茯神蕤仁棗仁轉方加黃芩灶心土余依上法薛家灣郭復診方喘之一證已得大補而平可見肝脾腎三經虧之已極姑置勿論現在脈芤且弦其名為革以昭血絡空虛元氣難攝之意夫惟元氣難攝所有溫邪下注為便溏外走為浮腫上逆為咳痰甚至陰絡傷血內溢之下更有陽絡傷血外溢之症似此中虛少納者遇之竊恐不堪磨耐仍起風波而敗不可忽略制川附七分青鹽下拌大生地二錢白芍一錢阿膠一錢五分炙草四分人參七分五味子七分麥冬一錢五分牡蠣一兩伏龍肝一兩烏梅一錢崑山陶濕有五肥人之濕多起於脾脾主濕又濕主土土氣不旺濕邪無路可出出則變而為痰化而為熱所為濕生痰痰生熱是也濕熱痰體已既有年姑置勿論且論病經兩候痛瀉起因繼寒熱往來一日日三度發其間厄忒頻頻七日而止顯系冷風外感內從少陽而入裡氣不納上逆沖激出入無定使然當時汗出太多雖有口舌嘔惡等症卻難和以小柴胡湯現在汗已不少吐亦未除下亦通矣三法自盡而瘧疾仍作胸前痞悶右脈大虛邪氣還盛汗吐下三法既不可施惟有和寒溫三例尚可以行常見丹田有熱胸上有寒白胎滑者仲景曾有一方喻氏師之以為和上下法之計又見汗吐下三法之後胸前作痞噫氣不舒者用旋覆代赭石湯通其陽鎮其逆俾得厄不再起想亦未始不合也然以此治法不獨為新病而設即舊時之濕熱生痰亦與焉和方之制和其不和也不和於已虛之後竊恐虛波暗起不可忽略候諸高明先生政川連乾薑炙草復花赭石人參半夏桂枝茯苓陳皮白芍草果仁生薑紅棗附子青鹽拌炒生於術薑水拌炒焦又轉方今晨寒熱又作來勢頗輕嘔亦稍松苔亦尖薄所受風寒濕熱卻有暗化之機似屬佳兆無如脈之弦滑都帶空象元氣陽氣實已內虛虛而有邪不得不扶正化邪為法蓋恐邪未盡而正先盡耳制川朴於朮人參桂枝草果仁乾薑炙草茯苓川連復花赭石陳皮白芍薑紅棗製半夏又二爺之病風邪外感內蒸濕熱痰濁古人所謂夾病此等症是也何以見之風入少陽則為寒熱往來半在表半在裡出而與陽爭則寒寒宜不飲入而與陰爭則熱熱宜發渴今寒時喜熱飲熱時反不渴若無濕熱痰濁何以如是耶是以舌苔滿布面已晦滯脈已帶滑盡見空濡之象欲去其風必須化濕化痰化熱以除兼夾之邪則風邪尋路而出不被兼夾所持矣然熱自痰生痰從濕化即欲化痰化熱先宜化盡濕邪嘉言云舍助陽別無驅濕之法明示人以溫通為主將來附子理中連理輩一定章程其中損益尤須臨病斟酌活法在諸高明公也設使兼夾之邪日化一日而瘧機未脫仍可用小柴胡湯和之或寒熱漸輕但師其意不取其方亦未為不可然而諸高明自有見識不必多言此亦因主人之囑聊以應命焉紹興邵東方生風風生木木生肝肝居人左全賴血以濡之又為剛藏根憑水以涵之腎水本虧於下心血更耗於上肝失養惟橫逆有升無降無怪乎其臥則血歸於肝之候魂不藏氣反逆少腹一沖直至胸膈心為之悸身為之搖風從內起始而母病及子繼以子病及母所謂諸風掉眩皆屬於肝亦謂上升之氣自肝而出此等症是也夫肝者將軍之官非氣不和下滋腎水上清心火以養木仍不出乎專理肝經例治舍許學士真珠母一法而誰請政石決明熟地茯苓黨參棗仁歸身沉香犀角柏子仁龍齒西匯胡天之熱氣下地之濕氣上人在氣交之中無隙可避虛而受者即名曰暑暑之為言有濕有熱不言而喻矣夫暑先入心暑必傷氣氣分之濕不為之先除則所蓄之熱必不能外出所以暑濕熱三氣交蒸之初務須消去其濕正合古人消暑在消其濕之旨也然濕邪一去熱氣即從外達又名暑熱不名暑濕一氣而有兩名前後之用藥有異蓋以熱則陰傷氣亦更弱無怪乎鼻衄舊恙上從清道而出身體困憊飲食漸減脈轉弦數陽分更熱口內知干種種見虛中有實之象但暑邪一證河間每論三焦現在頭額昏蒙邪熱偏於中上惟衄去過多虛在下焦陰液如此細診斷在少陰不足陽明有餘有何疑惑哉擬張景嶽玉女煎法俾得中下焦熱氣上熏於肺者悉從暗化而下焦之陰氣亦不再傷仍不出乎劉氏三焦治例未知是否候西耕先生政之細生地煨石膏懷牛膝麥冬知母九牛二虎丸左虎掌十二兩酥炙茯苓五兩人乳拌蒸曬牛肋骨九根要用第三根者佳酥炙牛膝五兩鹽水炒大力子二十兩生曬白蒺藜二十兩去刺小川芎一兩生曬歸身五兩酒炒黃耆五兩蜜炙沙參五兩鹽水炒雄烏骨雞一隻將雞干去毛雜煮爛連骨重打如泥酥炙共為細末煉蜜和丸桐子大每服四錢朝以開水送下松江朱左升太過右降不及何經之病曰右肺左肝肺肝同病自然升降失常然肺為五臟華蓋肝脈布於兩脅此左升僅屬肝右降反屬肺矣何也蓋肝體在旁肺體在上只就位置而言若論其作用內經又曰肝居人左肺居人右右之不降正失其清肅之用也左之過升肝反多所生逆之用也橫逆之邪加於清肅之所木寡於畏反侮於金無怪乎半身以左之氣旋於右既不能透徹於上亦不能歸縮於下有時邪之相爭盤旋脅部直宜待得矢氣則快然如衰者木究不能上克於金而仍下制於土地也夫土曰稼穡作甘者也木曰曲直作酸者也口甘帶酸痰唾亦然何莫非土受木乘之過木亦太剛矣哉誰能柔之惟有左金一方以為剋木之制則木正其體金得其用可患升降之不得其常耶左金丸又接續手札荷蒙錦念謝謝細繹病源所云氣火益熾等症即古語云氣有餘便是火氣從左邊起者肝火也左金丸主之當歸龍薈丸亦主之然左金一丸如水投石於前自宜以當歸龍薈丸繼之於後未常不可為法也設使以當歸龍薈丸即日為之聊應臺命宜矣無如我先生有為癰為血不可不預防也一語斷非無稽之談出而高明者弟始而駭然繼而茫然自亦不知其筆從何處著也然在望一方者如飢如渴以速為貴而弟亦刻無寧晷不過夜以繼日有者求之無者求之必得左宜之右無不宜之要法然覆書非敢緩也蓋有待也端午日下問者少小徒聚在一堂講論百病皆生於氣遂有九氣不同之説氣本一也因所觸而為九怒與思為九氣中之二焉思則氣結內經自為注腳之思則心有所存神有所歸正氣留而不行故氣結矣先生有之不必言矣至於怒則氣上甚則嘔血恐則氣逆筋緩發於外為癰疽古人亦載氣門以昭邪郁必變久病入絡非無意也先生博學而預料之小徒強志而問及之弟即從此而領悟怒有形於外者亦有不形於外者形於外者每出於暴怒暴怒傷陰不形於外者名曰鬱怒鬱怒傷肝然視履考詳而陰傷於暴怒者未必有之言辭安定而肝傷於鬱怒者豈曰無之惟其鬱也木即不能暢茂條達反來橫逆則氣鬱於中者勢必火炎於上金受火刑有升無降痰血熱辨一病於肺痞滿悶塞再病於脾脾肺同病則胃家之痰食無力消膽經之水火從而和之將來血溢於癰癰腫於經絡增出一番新病誠不能不未雨而綢繆者也然為癰為血之枝葉仍不外乎氣鬱之火為根治病必求其本因思氣從左邊起者條內有久患氣結諸藥不效者先服沉香化氣丸以開其結之文不獨將來之變病可以預防即現在之氣火升騰亦為要著而況右脈弦強則土鬱奪之之法本來鄭重者乎但沉香化氣丸重劑也權宜也元虛久病之體不能不用不可多用清晨只服八分晚服逍遙六君輩調之以為實必顧虛之計未知是否朝服沉香化氣丸晚服逍遙散六君湯北沙參半夏易川貝甘露華大少爺之病伏暑晚發之病也暑邪者何天之熱氣下地之濕氣上人在氣交之中無隙可避感而受者假使發於當時其邪易達其氣未深耳惟深伏三焦直至秋晚而發道遠氣深自內達外焉得見輕所以病經十有三日日重一日矣然伏邪僅在三焦不逢寒熱分爭之下所見者無非胸前痞悶口中甜膩二便失調而已茲乃肢麻不已更見厥逆顯系所患之邪不從三焦而出反入於肺肝肝者將軍之宮其性橫逆上犯肺氣則見為厥傍流中土則見為麻麻厥並至不惟熱盛亦且肝傷逆矣然肝陽之逆暑氣之侵原非無故而作良以風喜傷肝未平之前先招風氣引動伏邪加以陰氣素虛肝失所養所謂最虛之處便是客邪之處三焦久病纍及乎肝最為惡候能不慮其虛不化邪厥逆頻頻乎所幸者膽受暑膽屬少陽其機不樞有出入之意焉是以寒熱之勢變為寒熱往來間日而作俾得從此漸輕不獨肝臟之邪可以外傳於腑即溜在三焦者亦可望其歸併也但少陰本虛脈弦而芤最怕欲化不能亦恐半途而廢邪實正虛用藥最難入手然就寤言不寐多夢紛紜邪在膽經為甚惟有十味溫膽湯加減似屬左右咸宜未知是否候政十味溫膽湯加羚羊角龍齒省頭草朱家角邵四太爺之病肝腎素虛肺胃新感之病也夫肝屬乙腎屬癸乙癸同源病則本重但病者多花甲之年即使不病新邪筋骨間早已空虛何堪再經磨耐又意寒熱陡發直至一候有餘而解解則急急補之猶恐填而不足乃又經復食消克等劑在所必需幸而外熱遽減裡熱不清已虛而益著其虛咳嗽更劇渴痰黏膩出而不爽氣息短促形神困頓飲食不思病勢有加無已因病致虛因虛更病互相為患者也至於苔色或黃或白現在又多剝象左脅曾疼兩膝常屈臥床不起小水仍黃干而未渴加以音不揚睡中語顯系肺胃兩經之熱既不能從外而泄又不能從上而清邪無出路斷無中道而立之理勢已逼入下焦兩傷肝腎所謂最虛之處是客邪之處是也然邪之所湊其氣必虛留而不去其病為實實則瀉之虛則補之以使補不足其邪瀉不傷其正一舉兩得方合實必因虛之計此等之法似屬從證而未言脈然所診之脈豈有不合之理右寸關部弦而且滑左尺關部細而且數數則為熱滑則為痰弦主乎肝細主乎腎豈非肺胃兩經之熱痰正甚肝腎兩經之虛氣大昭無怪乎其氣從左逆臥不能側更著上實下虛之症焉為日已久肺失清肅之司相傳無權腎失封藏之本作強無主而來喘息標本兩治否則氣不歸原難卜其旋見吉兆三才湯合十味溫膽湯兩經法加減生地人參天冬竹茹橘紅茯神棗仁歸身羚羊角川貝桑皮骨皮蛤殼復診清養之下弦滑脈象較昨頗緩然肺受熱傷每易成痿不可不慮方加冬瓜子絲爪絡又方喘出於腎關於肺標本同源病始而邪甚繼以正衰大非久病所宜熱在上焦者因咳為肺痿仲聖早已言之非無意肺之一臟外為熱火所爍內被肝火所逆金不生水水不涵木木反侮金其畏如虎轉與復脈湯治其下葦莖湯治其上以冀弋獲炙草人參生地麥冬阿膠東瓜子絲瓜絡蓮根苡米川貝知母桑皮骨皮蛤殼未録住址姓氏細繹病原總不外乎燥之一字燥萬物者莫燥乎火火有虛實火稍清而虛火之上炎不能歸縮於下也是以黃痰之外更見粉紅舌乾糙燥便結小堅肌膚乾熱甚至手震睡語以昭熱極生風液涸風動之象焉何必以脈之左者反浮右者反細而後知五志厥陽之火亦從而暗燥之其金乎當此肺已虛矣束手無策然又不能坐視惟有資液救焚湯雖曰鞭長莫及亦不得不以潤萬物者莫悅乎澤之思以冀吉人天相資液救焚湯蘆墟東茜墩陳夏問伏暑直至秋末而發亦云晚矣晚則其道遠其氣深橫連於膜原外發於陽明所以初發之時僅見蒸熱難得汗泄而不能解今已二十日矣曾經化火發渴發乾陰分必傷傷陰化燥本屬暑邪見症而況陽明中土萬物所歸尤易化火傷津者乎然陽明化火傷津不過清之養之而已尚可有為無如所患之症火內挾飲食之積結而不開盤踞小腸上升則口糜下注則便泄泄還不已轉而為痢其色黃而帶灰白便則多痛以昭邪盛則實之意焉設使胃家氣旺腎臟不虛而用攻克之劑尚可以勝其任者原為幸事然而飲食不思神情困倦面白帶青肌肉暗削小便不多少陽陽明兩經之正氣索然津液先涸須急補助已恐鞭長莫及也豈能再用攻克診得右脈弦數左脈細小細小為虛弦數為實虛中有實法補實則礙虛補虛又礙實用藥實為兩難惟有豬苓湯一法最為瘀後傷陰所合然下焦可治而中焦之結者肝陰之虧者仍未得以兼治參入六一散方佐以芍藥甘草湯為一方而三法備焉之計以冀弋獲否則悠悠而脫矣候諸高明先生政之豬苓阿膠赤苓澤瀉紅曲甘草芍藥滑石取薺菜花一兩荸薺四個海蜇一兩煎湯代水又進豬苓湯後所見下痢已減其半所化之邪亦減其半所以唇之腫者能消齒之垢者能清以及右脈之弦數者能緩能和似屬佳兆然左脈細小按之仍屬無神且兼關部帶弦弦主乎肝細小無神又主乎真陰不足惟以不足之真陰難以涵養肝木肝木順乘土中尤為易事如土中尚屬有權往往於病邪消化之後胃口漸開生機可望此乃胃中之津液早被熱氣所傷又為下痢所劫一傷一劫杳不思谷乾嘔噁心所為津劫病至津竭禍來此等症是也若論上腸盤踞之邪痛勢仍然按之未減而其位置則已近於小腹而不連於脅部勢欲下行還未歸併大腸即使貽患將來不過為癰為血尚可徐圖惟此虛態百出變生眉眼能無懼乎然則不得不宗七虛七實扶正為先之訓回元氣於無何有之鄉再圖僥幸候政人參五味子麥冬銀花甘草荸薺海蜇白芍青皮丹皮川貝橘白牡蠣花粉人中白取炒香穀芽五錢煎湯代水又未録住址姓氏驚悸起因傳為顫振繼以寤寐不寧左脈細軟右關弦數數則為火弦則為痰細軟又主乎虛虛在肝腎兼以痰火結在脾胃所以肢體軟弱口燥身疼也連日固本既屬安適可無更張惟痰火內勝不以十味溫膽法加減佐之以為標本兼顧之計俾得虛不再虛未知是否同石盤竹香先生議人參大熟地浮石拌炒棗仁歸身天冬大生地茯苓橘紅竹茹川貝柏仁龍齒石決明次診病顫振振乃陰氣爭勝顫則陽氣不復其勢之來上衝則鼓頷四散則肢動至於肉瞤筋惕不過來勢之輕者治此病者平補鎮心而已惟肝不藏魂寤寐失常膽又內怯驚悸時作加以痰火串入用法須兼備免厥塞擬方侯石盤竹香先生均政龍齒人參歸身遠志茯神橘紅棗仁川連三分拌炒膽星石決明半夏竹瀝拌秫米竹茹鉤藤再次診顫振不發於冬至已責陽氣不復此在冬至以前發者尤為陽氣不復不言而喻至於陰氣爭勝似未明言而知陰氣之得爭以勝者為陽氣不充未經來復之故陰氣何能爭勝然陰之爭勝固明而其所爭所勝之陰究系何物邪氣曰肝屬陰痰亦屬陰痰生於脾脾經所生之痰內因肝經之陰火下動動則生風陰痰亦隨之而逆此顫振之所來也豈獨諸風掉眩皆屬於肝而已哉惟本有驚悸此因顫振而更劇無怪乎有寤多寐少等症也人參冬朮茯神炙草半夏陳皮大生地麥冬歸身白芍棗仁遠志秫米石決明竹茹鉤藤先服磁朱丸三錢陳皮湯下唯亭陸陰虧之體腎家一水本來不勝兩火此內經僅道其常也此間更有變者煩勞之下火從內起炎暑之時火自外加內外兩邪合而為一以腎水久虛者當之則陽絡受傷血從外溢溢而未清變為咳嗽甚至有聲有痰連連不已飲食雖可肌肉暗削自秋徂冬正屬金水相生之候是以見症尚和自覺相安於無事而不知仲春水旺亦反侮金金者肺也肺失清肅則音不揚咽中痛其喉為痹以昭一陰一陽之火氣內結金受其纍矣漸成損症也然脈形細數尚未見促陰火雖旺陰液未竭緩以圖之日進滋補俾得夏至陰生可卜其旋元吉現在脈虛火甚物雖下咽最為吃緊之時非清不可非補亦不可斟酌於二者之間惟有錢氏阿膠散法可以加減用之以合式擬候政阿膠馬兜鈴炙甘草牛蒡子花粉豬膚川貝秋石鳳凰衣麥冬粳米珠粉大生地杏仁另用水泛六味丸三錢清晨淡鹽湯送下平望陸紅疹屬血白㾦屬氣氣血同病㾦疹併發發則病宜解矣神必清矣此乃既發白㾦又發紅疹而神反昏沉身熱不退氣息短促加以舌縮質紅其苔灰薄遍身自汗足脛逆冷甚至下唇震動兩手然昨多喜笑小便自遺本來咳嗽今反寂然水飲與之則咽不與亦不思診得右寸脈形滑數關部濡軟左手皆見細小按之模糊想是風邪外感引動伏邪又被濕痰所阻元氣受傷走入手足厥陰也勢已危篤每易悠悠而脫邪從汗出元氣亦與之俱出正在勢不兩立之時用藥再為棘手勉從虛羸少氣之例立法以冀邪盡而元氣不與之俱盡現為第一要著竹葉石膏人參麥冬川貝炒穀芽生地花粉遠志茯苓鉤藤牛膝甘草犀角崑山陳胃脘當心而痛繼以形寒發熱如瘧而作甚至厄忒頻頻此係溫邪外感穢邪內踞加以濕痰食滯交結中宮也今使中宮之陽氣內旺所受之邪容易化達而此間元氣本虛諸邪又傷於後無力消除病延多日所以脈象空弦神情困倦非補不可之時也但舌苔白膩干欲熱飲下體先痹今更作麻噦逆噁心邪戀肺胃而腎氣亦衰用藥極難兼顧然溫養中宮佐以上下之品俾得一舉而三善備焉以冀即日見痊瘳為幸否則氣息易喘恐增額汗擬候諸高明先生政人參於朮川附乾薑炙草復花半夏厚朴丁香麥冬藿香木瓜赭石茅根枇杷葉又進前劑麻痹得和四肢亦緩且得吐出陳腐酸苦其色若塵此皆得溫而通也然厄忒頻頻氣自短促呻吟不絶噦逆嘔惡之象仍不陡除神情困倦左脈細空右脈弦急大便溏黑喜飲熱湯濕痰邪滯之外更有瘀血在裡邪從上出不自下行已為逆症而況嘔吐之時曾經額汗能不慮其虛波暗起而胱乎噦逆吐逆無不由乎氣之所載氣若不平諸症何從化解前方加減先使氣平為要復花赭石半夏洋參牛膝檳榔沉香杏仁刀豆子烏藥柿蒂大補陰丸又厄忒日輕嘔惡日重此即陳腐之邪內阻氣機為厄者都從嘔出所以一則見輕一則見重也然病根欲拔而其所出之路逆而不順上而不下失胃氣下行為順之理卻為纍事昨夜額雖無汗今朝脈尚弦急呻吟未絶所留陳腐之邪尚在中宮犯肺為咳犯胃為嘔直從中道而出又帶厄逆必須去盡宿邪庶幾有望指迷茯苓蘇子白芥子刀豆子厚朴茅根枇杷葉竹茹洋參又蕩滌宿邪之下嘔惡大減厄忒更緩脈象稍和呻吟漸除大便疊通無乃胃有下行為順之兆乎去痰莫如盡尚須磨蕩下行繼之於後可卜其旋元吉二蠶綿當歸川芎各三兩水五大碗煮至爛曬乾煅存性入後藥捲心荷葉四兩四錢取阿膠一兩五錢酒浸拌蒸曬七次者佳大熟地三兩砂仁末四錢酒煮香附四兩鹽水浸三夜童便浸五宿日夜各拌曬酒炒杜仲三兩鹽水炒真於朮二兩米泔浸一宿土炒川斷一兩六錢酒炒細子芩一兩六錢酒炒歸身二兩酒炒奎白芍一兩六錢酒炒甘草六錢蜜炙為末蜜丸每用二錢朝晚兩服砂仁湯送下至七個月不必服梨里王陽絡傷血外溢溢之後脈宜靜此乃脈細而數數則為熱細則陰虧所以氣息短促胸臆隱痛面色痿黃語言無力小水清白大便漆黑心悸少寐氣逆或悶動則火升倦則陽舉無一而非虛陽上擾陰血下虛氣不歸源之象氣有餘便是火氣不足即是寒不足之氣反見有餘此非真火乃是虛寒陰不戀陽血難配氣欲降其氣必須補陰不言而喻擬方請政人參五味子燕窩枇杷葉苡米橘紅石決明玉竹冬瓜子川貝母麥冬茯苓又診胸脅悶痛比之午間大減良以上焦瘀血漸從活動而清所進養陰利肺法似屬合宜然氣息之短促未長火升心悸口燥顴紅脈細仍數陽氣外露陰血內虧若能呼吸調和即是其旋元吉請政人參五味子麥冬白芍苡米橘紅石決明茯苓玉竹冬瓜子阿膠絲瓜絡接服方大生地麥冬北沙參茯苓甘草枇杷葉阿膠石決明百合敗龜板燕窩白芍骨皮玉竹茯神常熟俞肝藏魂肺藏魄魂升魄降一陰一陽之別也此間之病魄之降者一無所關魂之升者獨擅其奇始而見所未見今又聞所未聞男女話長分居左右此無他嬰兒奼女天各一方而實黃婆之不媒以合也夫黃婆屬土土中濕熱生痰以致天五地十之生成失其所主纍及肝魂魂不附中而出之於上欲治其上勢必先奠厥中六君子湯加獺肝另磁朱丸杭州鍾徐若泉令親姚名琨先生字來幼時瘦弱陰虛也痘後頭痛肝邪旺也不論外感何邪頭必痛者陰虛肝旺容易上升也十三四歲精氣通真元早泄此時反胖且兼痰火頭疼喜於敲者郁得敲而鬆也每發於春秋甚於長夏春分以後秋分以前溫熱令行也補則病無增減虛能受也即服消痰清火亦不見其長短有病則病當之也胸腹脹痛而用消克暫快一時胃得下行為順之常也從前痛時在額此更前後左右引及者肝有伏風善行數變不惟痰之為物隨氣升降無處不到也口中之臭鼻間之熱胃逆上衝也睡不足如在雲霧之中腰脊不能支持諸陽氣浮而無從也手足之熱黃白之苔面發之塊熱而且癢有時頭暈陽明中土萬物所歸上而躍也竹瀝可醫上病降而下之也飲食芳香可受否則不能者胃少衝和之氣也不欲水果脾不耐寒也又惡甜膩胃多濕熱也偏喜肉食水畜鹹寒療腎氣虛熱也近更胖者溫熱痰火扶助一身元氣擴充脾胃反見有餘也因男子二八而精通通在十三四歲時肝之疏泄早行腎之封藏不固如此猶可相安於無病不過知其陽之太過而已乃於幼時瘦弱已昭陰氣之虛痘後頭疼更著肝家之旺甚至不論何部從外而感痛如應響每發於春秋甚於長夏明明春分以後秋分以前在天地鬱蒸濕熱大行之時候土中素有之濕熱尚且同聲相應而況二五妙合之時早以濕熱為種身中常行春夏之生長而少秋冬之收藏大生廣生之候即大病特病之時張氏云素稟濕熱而挾陰虛此等症是也虛則補之實則瀉之各得其所故免久而生氣之弊然陽明中萬物所歸濕熱痰火無不歸之於胃此口中之臭鼻間之火黃白之苔手足之熱面發之塊癢而且熱之等象失其下行為順之常有升無降病無虛日矣一俟肝陽化風習習內動頭之自額而痛者前後左右靡不引之以昭風性善行數變愈轉愈深且至於睡不足時如在雲霧之中腰脊不能支持諸陽氣浮無所依從間或眩暈並行出於不意陰虛則失基亦云甚矣若論頭痛發明只須竹瀝一味可以愈者降而下之也此乃暫行之事而胃少衝和所食者僅以芳香可受脾難健運所食者竟以水果為嫌所惡之甜膩所喜之肉食一因濕熱內多一因陰氣虛極不問可知自始至終既不外陰虛濕熱無怪乎其駕馭濕熱者反能扶助作為已胖而益胖也然陰虛與濕熱又不兩立竊恐中年以後貽患無窮也不能不早為之計焉附方請政大熟地八錢丹皮三錢澤瀉二錢淮山藥四錢雲苓三錢白芍二錢石決明三錢黃柏一錢知母二錢青鹽二錢甘菊一錢女貞子三錢旱蓮草三錢沉香化氣丸三錢為末取忍冬藤五斤洗淨寸截煎湯去渣成膏入前藥量加白蜜糊丸每服三錢早晚兩服鹽湯送下洞庭山徐嚴少宰妹始而腳痛繼以頭疼陡然昏不知人手振肉瞤動氣故築牙關與兩目上視面黃顴紅唇上色青其下亦然呼吸痰聲左關已無脈寸部甚微右尺亦絶關前獨大且滑其人不吐鼻且不煽汗亦不出四肢厥冷諸醫束手都以真珠母丸法應酬而劇此痰祟附於肝經擾亂不寧以致地水火風無不上加於天也古來無此成方以意逆之一劑而活動二劑而舌伸三劑而能言歸語門人茯神五錢硃砂拌沉香三分金器四錢磁石四錢獺肝一錢人參一錢竹瀝一錢五分人薑汁一匙沖甘菊一錢五分炒先以烏梅肉擦開牙關嘉慶乙亥元和時疫論將欲施藥施醫施棺於郡邑之中則必先解囊後勸善勞心勞力日費經營乃可以有為也然而求活人甚衆之舉不易得焉備其藥得醫省其棺昔之所難者今於是乎見之元和實推為善之鄉當年賑濟尚有餘資仍思設法以公諸貧民有紳士焉憂上天之疫癘有富貴者焉患生人之夭札時維初夏正暑濕熱三氣將蒸又值乙運之歲金不及亥年之風木偏淫不惟木寡於畏反侮其金而且凶年穢亂之氣亦被其扇動於中人在氣交無隙可避是一人中其氣則為濕溫一方染其氣即為時疫之候也周邑尊既理荒政之餘望其氣而異之集醫問乃病答曰乙為從革炎火盛行亥屬厥陰風淫所勝風火相煽則吳又可瘟疫論之見證不一邪之盤踞於膜原者勢必從九竅傳而出即外起之因內兼之證以末治之亦不能出此範圍也況吳又可論瘟疫及張石頑論時行疫氣周禹載論濕熱暑疫均值大撓甲子以來第七十三甲子厥陰司天少陽在泉風火用事之時後先闡發精義入神會元之司天如斯值之司天亦未必不如斯於是邑廟為局病者接踵而至門庭若市內外分科大小異位余時切一脈浮不沉而數望一舌白苔滿布問其所苦則凜寒發熱昏昏不爽余曰達原病旁一後生曰如用此法治之苔必轉黃而邪達矣服之果然及問後生為誰曰徐淡安先生之高弟徐鐵峰也伊父雪峰本屬老醫家學淵源從於局中可謂好學不倦者矣可謂與人為善者矣當如同善者如管佛容吳雲門先生冀百數十人分手而治論表裡分界者有人大劑清涼者有人下而再下者有人或濕多而仿濕熱混淆之治或氣異而採芳香逐穢之品或敗毒或消毒或解毒粲乎隱隱各得其所疇不仰體痌環在抱之心共相逐疫效技於堂廡之中哉外之往視諸徒一如局中論治死生若判霍然而愈者實不勝枚舉已乃設席延醫繼以觀劇成贊且賀曰見公之作知公之志愛民如子豈不欲救民於衽席紳之積善餘慶豈不欲周急而扶危富之好義施財豈不欲博施而濟衆醫之婆心一片豈不欲起死而回心夫然設是局也豈博樂善好施之名歟將使繼公之理者見其實惠知其真心也
